<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>live2gether</title>
    <link href="https://vjs.zencdn.net/8.23.4/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.23.4/video.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --panel: rgba(15, 23, 42, 0.62);
        --panel-2: rgba(2, 6, 23, 0.72);
        --line: #1e293b;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --blue: #3b82f6;
        --blue-2: #2563eb;
        --blue-soft: rgba(59, 130, 246, 0.14);
        --green: #22c55e;
        --panel-open-dur: 400ms;
        --panel-close-dur: 350ms;
        --panel-translate-y: 18px;
        --panel-blur: 2px;
        --panel-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --digit-dur: 500ms;
        --digit-distance: 8px;
        --digit-stagger: 70ms;
        --digit-blur: 2px;
        --digit-ease: cubic-bezier(0.34, 1.45, 0.64, 1);
        --digit-dir-x: 0;
        --digit-dir-y: 1;
        --text-swap-dur: 150ms;
        --text-swap-translate-y: 4px;
        --text-swap-blur: 2px;
        --text-swap-ease: ease-in-out;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      * {
        box-sizing: border-box;
      }

      .layout > *,
      .side > *,
      .setup-form > *,
      .room-controls > *,
      .chat-form > * {
        min-width: 0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #000;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .shell {
        width: min(1680px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 14px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 0.96rem;
        letter-spacing: 0;
      }

      .github-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 999px;
        padding: 0 12px;
        color: #cbd5e1;
        background: rgba(15, 23, 42, 0.64);
        text-decoration: none;
        font-size: 0.84rem;
        transition: border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .github-link:hover {
        border-color: rgba(96, 165, 250, 0.45);
        background: rgba(30, 41, 59, 0.84);
        transform: translateY(-1px);
      }

      .github-link svg {
        width: 17px;
        height: 17px;
        fill: currentColor;
        flex: 0 0 auto;
      }

      .status {
        min-height: 1.35em;
        color: var(--muted);
        font-size: 0.9rem;
        transition: color var(--text-swap-dur) var(--text-swap-ease);
      }

      #status[data-active="true"] {
        color: #bfdbfe;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 12px;
        align-items: start;
      }

      body:not(.has-room) .layout {
        grid-template-columns: minmax(0, 1fr);
      }

      body:not(.has-room) .side {
        display: none;
      }

      .surface {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        background: var(--panel);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .player-card {
        padding: 8px;
        animation: enter 420ms ease both;
      }

      .stage {
        aspect-ratio: 16 / 9;
        width: 100%;
        min-height: min(68vh, 700px);
        position: relative;
        overflow: hidden;
        border-radius: 10px;
        background: #000;
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .video-js {
        width: 100%;
        height: 100%;
        background: #000;
        font-family: inherit;
      }

      .video-js .vjs-control-bar {
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.1), rgba(2, 6, 23, 0.86));
      }

      .video-js .vjs-big-play-button {
        width: 64px;
        height: 64px;
        margin-top: -32px;
        margin-left: -32px;
        border-radius: 999px;
        border-color: rgba(255, 255, 255, 0.28);
        background: rgba(15, 23, 42, 0.82);
        transition: transform 180ms ease, background 180ms ease;
      }

      .video-js:hover .vjs-big-play-button {
        background: rgba(37, 99, 235, 0.88);
        transform: scale(1.04);
      }

      .setup-panel {
        position: absolute;
        inset: auto 18px 18px;
        z-index: 2;
        padding: 14px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 14px;
        background: rgba(2, 6, 23, 0.82);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(16px);
      }

      .cookie-panel {
        position: absolute;
        right: 18px;
        bottom: 18px;
        left: 18px;
        z-index: 3;
        display: grid;
        gap: 10px;
        max-width: 720px;
        padding: 14px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 14px;
        background: rgba(2, 6, 23, 0.92);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(16px);
      }

      .cookie-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .cookie-title {
        color: #dbeafe;
        font-size: 0.9rem;
        font-weight: 780;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 12px;
        padding: 12px;
        color: var(--text);
        background: rgba(2, 6, 23, 0.78);
        outline: none;
        font: 0.86rem/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      textarea:focus {
        border-color: rgba(96, 165, 250, 0.8);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
      }

      .cookie-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      body.has-room .setup-panel {
        transform: translateY(var(--panel-translate-y));
        opacity: 0;
        filter: blur(var(--panel-blur));
        pointer-events: none;
        transition:
          transform var(--panel-close-dur) var(--panel-ease),
          opacity var(--panel-close-dur) var(--panel-ease),
          filter var(--panel-close-dur) var(--panel-ease);
      }

      .setup-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .roombar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 2px 0;
      }

      .room-controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      .t-panel-slide {
        transform: translateY(var(--panel-translate-y));
        opacity: 0;
        filter: blur(var(--panel-blur));
        pointer-events: none;
        transition:
          transform var(--panel-close-dur) var(--panel-ease),
          opacity var(--panel-close-dur) var(--panel-ease),
          filter var(--panel-close-dur) var(--panel-ease);
        will-change: transform, opacity, filter;
      }

      .t-panel-slide[data-open="true"] {
        transform: translateY(0);
        opacity: 1;
        filter: blur(0);
        pointer-events: auto;
        transition:
          transform var(--panel-open-dur) var(--panel-ease),
          opacity var(--panel-open-dur) var(--panel-ease),
          filter var(--panel-open-dur) var(--panel-ease);
      }

      input,
      select {
        min-width: 0;
        min-height: 44px;
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 14px;
        padding: 0 13px;
        color: var(--text);
        background: rgba(2, 6, 23, 0.72);
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      .setup-form input {
        min-height: 48px;
        border-radius: 12px;
        font-size: 0.98rem;
      }

      input:focus,
      select:focus {
        border-color: rgba(96, 165, 250, 0.8);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.16);
      }

      select:disabled {
        color: #64748b;
      }

      .quality-wrap {
        display: none;
      }

      .quality-wrap[data-host="true"] {
        display: block;
      }

      .quality-wrap select {
        width: auto;
        max-width: 180px;
        min-height: 40px;
        border-radius: 999px;
        padding: 0 34px 0 13px;
        font-size: 0.86rem;
      }

      .button {
        min-height: 44px;
        border-radius: 12px;
        padding: 0 16px;
        color: #eff6ff;
        background: linear-gradient(135deg, var(--blue), var(--blue-2));
        font-weight: 760;
        white-space: nowrap;
        transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
      }

      .button:hover {
        transform: translateY(-1px);
        filter: brightness(1.04);
      }

      .button.secondary {
        background: rgba(30, 41, 59, 0.9);
        box-shadow: none;
      }

      .room-controls .button {
        min-height: 40px;
        border-radius: 999px;
        padding: 0 13px;
        font-size: 0.86rem;
      }

      .side {
        display: grid;
        gap: 12px;
        animation: enter 520ms ease both;
      }

      .card {
        padding: 14px;
      }

      .card-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        color: #cbd5e1;
        font-size: 0.82rem;
        font-weight: 800;
        text-transform: lowercase;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stat {
        border-radius: 12px;
        padding: 12px;
        background: rgba(2, 6, 23, 0.52);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .stat-value {
        display: inline-flex;
        align-items: baseline;
        color: #dbeafe;
        font-size: 1.24rem;
        font-weight: 820;
        min-height: 1.45em;
      }

      @keyframes t-digit-pop-in {
        0% {
          transform: translate(
            calc(var(--digit-distance) * var(--digit-dir-x)),
            calc(var(--digit-distance) * var(--digit-dir-y))
          );
          opacity: 0;
          filter: blur(var(--digit-blur));
        }
        100% {
          transform: translate(0, 0);
          opacity: 1;
          filter: blur(0);
        }
      }

      .t-digit {
        display: inline-block;
        will-change: transform, opacity, filter;
      }

      .t-digit-group.is-animating .t-digit {
        animation: t-digit-pop-in var(--digit-dur) var(--digit-ease) both;
      }

      .t-digit-group.is-animating .t-digit[data-stagger="1"] {
        animation-delay: var(--digit-stagger);
      }

      .t-digit-group.is-animating .t-digit[data-stagger="2"] {
        animation-delay: calc(var(--digit-stagger) * 2);
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.78rem;
      }

      .players {
        display: grid;
        gap: 8px;
        max-height: 156px;
        overflow: auto;
      }

      .player {
        display: flex;
        align-items: center;
        gap: 9px;
        min-height: 34px;
        color: #cbd5e1;
        font-size: 0.9rem;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.12);
      }

      .chat-log {
        display: grid;
        align-content: start;
        gap: 9px;
        height: 310px;
        overflow: auto;
        padding-right: 4px;
      }

      .message {
        padding: 10px 11px;
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.55);
        border: 1px solid rgba(148, 163, 184, 0.12);
        animation: messageIn 220ms ease both;
      }

      .message strong {
        display: block;
        margin-bottom: 3px;
        color: #93c5fd;
        font-size: 0.78rem;
      }

      .message span {
        color: #e2e8f0;
        font-size: 0.9rem;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .chat-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        margin-top: 10px;
      }

      .empty {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .hidden {
        display: none !important;
      }

      .t-text-swap {
        display: inline-block;
        transform: translateY(0);
        filter: blur(0);
        opacity: 1;
        transition:
          transform var(--text-swap-dur) var(--text-swap-ease),
          filter var(--text-swap-dur) var(--text-swap-ease),
          opacity var(--text-swap-dur) var(--text-swap-ease);
        will-change: transform, filter, opacity;
      }

      .t-text-swap.is-exit {
        transform: translateY(calc(var(--text-swap-translate-y) * -1));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
      }

      .t-text-swap.is-enter-start {
        transform: translateY(var(--text-swap-translate-y));
        filter: blur(var(--text-swap-blur));
        opacity: 0;
        transition: none;
      }

      @keyframes enter {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.99);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes messageIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop {
        from {
          opacity: 0.4;
          transform: translateY(4px) scale(0.92);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          transition-duration: 1ms !important;
          scroll-behavior: auto !important;
        }

        .t-panel-slide,
        .t-text-swap,
        .t-digit-group .t-digit {
          animation: none !important;
          transition: none !important;
        }
      }

      @media (max-width: 1040px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .side {
          grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        }
      }

      @media (max-width: 700px) {
        .shell {
          width: min(100vw - 20px, 1440px);
          padding: 12px 0;
        }

        .topbar,
        .side,
        .chat-form {
          grid-template-columns: 1fr;
          display: grid;
        }

        .topbar {
          align-items: start;
        }

        .github-link span {
          font-size: 0;
        }

        .github-link span::after {
          content: "github";
          font-size: 0.84rem;
        }

        .setup-panel {
          inset: auto 10px 10px;
          padding: 10px;
        }

        .cookie-panel {
          position: fixed;
          inset: auto 10px 10px;
          max-width: none;
          max-height: calc(100vh - 20px);
          padding: 10px;
          overflow: auto;
        }

        .setup-form {
          grid-template-columns: 1fr;
        }

        .roombar {
          align-items: stretch;
          flex-direction: column;
        }

        .room-controls {
          justify-content: stretch;
        }

        .room-controls .button,
        .cookie-actions .button,
        .quality-wrap,
        .quality-wrap select {
          width: 100%;
        }

        .top-actions,
        .cookie-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .stage {
          min-height: 220px;
        }
      }
    </style>
  </head>
  <body data-session-id="{{ .SessionID }}">
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>live2gether</h1>
        </div>
        <div class="top-actions">
          <button type="button" class="button secondary" id="login-toggle">youtube login</button>
          <a class="github-link" href="https://github.com/giulianoo0/live2gether" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .5a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.2c0 .4.2.7.8.6A12 12 0 0 0 12 .5Z" />
            </svg>
            <span>github.com/giulianoo0/live2gether</span>
          </a>
        </div>
      </header>

      <div class="layout">
        <section class="player-card surface">
          <div class="stage" aria-label="video player">
            <video id="media" class="video-js vjs-default-skin vjs-big-play-centered" controls playsinline preload="auto"></video>
            <div class="setup-panel t-panel-slide" id="setup-panel" data-open="true">
              <form class="setup-form" id="stream-form">
                <input id="stream-url" name="url" type="url" placeholder="paste a youtube live url" autocomplete="url" required />
                <button class="button" type="submit">start</button>
              </form>
            </div>
            <section class="cookie-panel t-panel-slide" id="cookie-panel" data-open="false" aria-label="youtube login">
              <div class="cookie-row">
                <div class="cookie-title" id="cookie-title">youtube login</div>
                <button type="button" class="button secondary" id="cookie-close">close</button>
              </div>
              <textarea id="cookies-text" maxlength="131072" spellcheck="false" autocomplete="off" placeholder="paste cookies.txt"></textarea>
              <div class="cookie-actions">
                <button type="button" class="button secondary" id="cookie-clear">clear</button>
                <button type="button" class="button" id="cookie-save">save login</button>
              </div>
            </section>
          </div>

          <div class="roombar">
            <div class="status"><span class="t-text-swap" id="status">paste a stream url</span></div>
            <div class="room-controls t-panel-slide" id="room-controls" data-open="false">
              <button type="button" class="button secondary" id="copy-share">copy link</button>
              <button type="button" class="button secondary" id="live-sync">live</button>
              <label class="quality-wrap" id="quality-wrap" aria-label="stream quality">
                <select id="quality-select" aria-label="stream quality" disabled></select>
              </label>
            </div>
          </div>
        </section>

        <aside class="side">
          <section class="surface card">
            <div class="card-title">
              <span>room</span>
              <span id="host-label">viewer</span>
            </div>
            <div class="stats">
              <div class="stat">
                <span class="stat-value t-digit-group" id="viewer-count">0</span>
                <span class="stat-label">watching</span>
              </div>
              <div class="stat">
                <span class="stat-value t-digit-group" id="message-count">0</span>
                <span class="stat-label">messages</span>
              </div>
              <div class="stat">
                <span class="stat-value" id="quality-current">auto</span>
                <span class="stat-label">quality</span>
              </div>
            </div>
          </section>

          <section class="surface card">
            <div class="card-title">
              <span>players</span>
              <span id="players-count">0 online</span>
            </div>
            <div class="players" id="players">
              <div class="empty">no one has joined yet.</div>
            </div>
          </section>

          <section class="surface card">
            <div class="card-title">
              <span>chat</span>
              <span>room only</span>
            </div>
            <div class="chat-log" id="chat-log">
              <div class="empty">messages will show up here.</div>
            </div>
            <form class="chat-form" id="chat-form">
              <input id="chat-input" maxlength="500" autocomplete="off" placeholder="say something" />
              <button class="button secondary" type="submit">send</button>
            </form>
          </section>
        </aside>
      </div>
    </main>

    <script type="module">
      const body = document.body;
      const form = document.querySelector("#stream-form");
      const urlInput = document.querySelector("#stream-url");
      const statusEl = document.querySelector("#status");
      const setupPanel = document.querySelector("#setup-panel");
      const roomControls = document.querySelector("#room-controls");
      const copyButton = document.querySelector("#copy-share");
      const loginToggle = document.querySelector("#login-toggle");
      const cookiePanel = document.querySelector("#cookie-panel");
      const cookieClose = document.querySelector("#cookie-close");
      const cookieClear = document.querySelector("#cookie-clear");
      const cookieSave = document.querySelector("#cookie-save");
      const cookiesText = document.querySelector("#cookies-text");
      const qualityWrap = document.querySelector("#quality-wrap");
      const qualitySelect = document.querySelector("#quality-select");
      const liveSyncButton = document.querySelector("#live-sync");
      const viewerCount = document.querySelector("#viewer-count");
      const playersCount = document.querySelector("#players-count");
      const playersEl = document.querySelector("#players");
      const messageCount = document.querySelector("#message-count");
      const qualityCurrent = document.querySelector("#quality-current");
      const hostLabel = document.querySelector("#host-label");
      const chatLog = document.querySelector("#chat-log");
      const chatForm = document.querySelector("#chat-form");
      const chatInput = document.querySelector("#chat-input");
      let socket;
      let currentPlaylist = "";
      let currentSessionId = "";
      let currentHostToken = "";
      let currentShareURL = "";
      let browserSessionId = localStorage.getItem("live2gether:browser-session") || "";
      let lastStatus = statusEl.textContent;
      const player = window.videojs("media", {
        fill: true,
        liveui: true,
        html5: {
          vhs: {
            overrideNative: true,
          },
        },
      });

      const setStatus = (message) => {
        if (!message || message === lastStatus) {
          return;
        }
        lastStatus = message;
        statusEl.dataset.active = "true";
        const duration = Number.parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--text-swap-dur")) || 150;
        statusEl.classList.add("is-exit");
        window.setTimeout(() => {
          statusEl.textContent = message;
          statusEl.classList.remove("is-exit");
          statusEl.classList.add("is-enter-start");
          void statusEl.offsetHeight;
          statusEl.classList.remove("is-enter-start");
        }, duration);
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => {
          statusEl.dataset.active = "false";
        }, duration + 420);
      };

      const hostTokenKey = (id) => `live2gether:host:${id}`;

      const ensureBrowserSession = async () => {
        const response = await fetch("/api/browser-sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id: browserSessionId }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "could not create browser session");
        }
        browserSessionId = payload.id;
        localStorage.setItem("live2gether:browser-session", browserSessionId);
        loginToggle.textContent = payload.hasYouTubeCookies ? "youtube saved" : "youtube login";
        return payload;
      };

      const openCookiePanel = () => {
        setupPanel.dataset.open = "false";
        cookiePanel.classList.remove("hidden");
        cookiePanel.dataset.open = "true";
        cookiesText.focus();
      };

      const closeCookiePanel = () => {
        cookiePanel.dataset.open = "false";
        if (!body.classList.contains("has-room")) {
          setupPanel.dataset.open = "true";
        }
      };

      const authLooksRequired = (snapshot) => {
        if (snapshot.status !== "failed") {
          return false;
        }
        const text = `${snapshot.message || ""}`.toLowerCase();
        return text.includes("cookies") || text.includes("login") || text.includes("sign in") || text.includes("country") || text.includes("not made this video available");
      };

      const showShare = (watchPath) => {
        currentShareURL = new URL(watchPath, window.location.origin).toString();
        body.classList.add("has-room");
        setupPanel.classList.remove("hidden");
        setupPanel.dataset.open = "false";
        roomControls.dataset.open = "true";
        window.clearTimeout(showShare.timer);
        showShare.timer = window.setTimeout(() => {
          setupPanel.classList.add("hidden");
        }, 380);
      };

      const qualityLabel = (snapshot) => {
        const selected = (snapshot.qualities || []).find((quality) => quality.id === snapshot.selectedQualityId);
        return selected?.label || "auto";
      };

      const applyQualityOptions = (snapshot) => {
        const hostToken = localStorage.getItem(hostTokenKey(snapshot.id)) || "";
        currentHostToken = hostToken;
        qualitySelect.disabled = hostToken === "";
        qualityWrap.dataset.host = hostToken ? "true" : "false";
        hostLabel.textContent = hostToken ? "host" : "viewer";
        qualitySelect.replaceChildren();
        for (const quality of snapshot.qualities || []) {
          const option = document.createElement("option");
          option.value = quality.id;
          option.textContent = quality.label;
          qualitySelect.append(option);
        }
        qualitySelect.value = snapshot.selectedQualityId || "best";
        qualityCurrent.textContent = qualityLabel(snapshot).toLowerCase();
      };

      const renderPlayers = (snapshot) => {
        const viewers = snapshot.viewers || [];
        setDigits(viewerCount, String(snapshot.viewerCount || 0));
        playersCount.textContent = `${snapshot.viewerCount || 0} online`;
        playersEl.replaceChildren();
        if (viewers.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "no one has joined yet.";
          playersEl.append(empty);
          return;
        }
        for (const viewer of viewers) {
          const row = document.createElement("div");
          row.className = "player";
          const dot = document.createElement("span");
          dot.className = "dot";
          const name = document.createElement("span");
          name.textContent = viewer;
          row.append(dot, name);
          playersEl.append(row);
        }
      };

      const renderChat = (snapshot) => {
        const messages = snapshot.chat || [];
        setDigits(messageCount, String(messages.length));
        chatLog.replaceChildren();
        if (messages.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "messages will show up here.";
          chatLog.append(empty);
          return;
        }
        for (const message of messages) {
          const item = document.createElement("div");
          item.className = "message";
          const author = document.createElement("strong");
          author.textContent = message.author;
          const text = document.createElement("span");
          text.textContent = message.text;
          item.append(author, text);
          chatLog.append(item);
        }
        chatLog.scrollTop = chatLog.scrollHeight;
      };

      const syncLive = () => {
        if (player.liveTracker && player.liveTracker.isLive()) {
          player.liveTracker.seekToLiveEdge();
          const playAttempt = player.play();
          if (playAttempt && typeof playAttempt.catch === "function") {
            playAttempt.catch(() => {});
          }
          return;
        }
        const video = player.tech(true)?.el();
        if (!video) {
          if (currentPlaylist) {
            player.src({ src: currentPlaylist, type: "application/x-mpegURL" });
          }
          return;
        }
        const ranges = video.seekable;
        if (ranges.length > 0) {
          video.currentTime = Math.max(ranges.end(ranges.length - 1) - 1.5, 0);
        }
        const playAttempt = video.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {});
        }
      };

      const setDigits = (group, value) => {
        const next = String(value);
        if (group.dataset.value === next) {
          return;
        }
        group.dataset.value = next;
        group.classList.remove("is-animating");
        group.replaceChildren();
        const chars = next.split("");
        chars.forEach((char, index) => {
          const span = document.createElement("span");
          span.className = "t-digit";
          span.textContent = char;
          if (index === chars.length - 2) {
            span.dataset.stagger = "1";
          } else if (index === chars.length - 1) {
            span.dataset.stagger = "2";
          }
          group.append(span);
        });
        void group.offsetHeight;
        group.classList.add("is-animating");
      };

      const connect = (id) => {
        if (socket) {
          socket.close();
        }
        currentSessionId = id;
        const wsURL = new URL(`/ws/${id}`, window.location.href);
        wsURL.protocol = wsURL.protocol === "https:" ? "wss:" : "ws:";
        socket = new WebSocket(wsURL);
        socket.addEventListener("message", (event) => {
          const snapshot = JSON.parse(event.data);
          setStatus(snapshot.message || snapshot.status);
          if (authLooksRequired(snapshot)) {
            openCookiePanel();
          }
          showShare(snapshot.watchPath);
          applyQualityOptions(snapshot);
          renderPlayers(snapshot);
          renderChat(snapshot);
          const playlist = `${snapshot.playlistPath}?v=${snapshot.playlistVersion || 0}`;
          if (snapshot.status === "ready" && playlist !== currentPlaylist) {
            currentPlaylist = playlist;
            player.src({ src: playlist, type: "application/x-mpegURL" });
            player.ready(() => syncLive());
          }
        });
        socket.addEventListener("close", () => {
          if (currentPlaylist === "") {
            setStatus("disconnected");
          }
        });
      };

      const loadSession = async (id) => {
        const response = await fetch(`/api/sessions/${id}`);
        if (!response.ok) {
          setStatus("session not found on this server");
          return;
        }
        const snapshot = await response.json();
        urlInput.value = snapshot.url;
        showShare(snapshot.watchPath);
        applyQualityOptions(snapshot);
        renderPlayers(snapshot);
        renderChat(snapshot);
        connect(snapshot.id);
      };

      const startRoom = async () => {
        await ensureBrowserSession();
        setStatus("creating room");
        const response = await fetch("/api/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: urlInput.value, browserSessionId }),
        });
        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.error || "could not start stream");
          return;
        }
        if (payload.hostToken) {
          localStorage.setItem(hostTokenKey(payload.id), payload.hostToken);
        }
        history.replaceState(null, "", payload.watchPath);
        showShare(payload.watchPath);
        applyQualityOptions(payload);
        renderPlayers(payload);
        renderChat(payload);
        connect(payload.id);
      };

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        startRoom().catch((error) => setStatus(error.message));
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(currentShareURL);
        copyButton.textContent = "copied";
        setTimeout(() => {
          copyButton.textContent = "copy link";
        }, 1200);
      });

      qualitySelect.addEventListener("change", async () => {
        if (!currentSessionId || !currentHostToken) {
          setStatus("only the host can change quality");
          return;
        }
        setStatus("changing quality");
        const response = await fetch(`/api/sessions/${currentSessionId}/quality`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            qualityId: qualitySelect.value,
            hostToken: currentHostToken,
          }),
        });
        const payload = await response.json();
        if (!response.ok) {
          setStatus(payload.error || "could not change quality");
        }
      });

      liveSyncButton.addEventListener("click", syncLive);

      loginToggle.addEventListener("click", () => {
        openCookiePanel();
      });

      cookieClose.addEventListener("click", closeCookiePanel);

      cookieClear.addEventListener("click", () => {
        cookiesText.value = "";
        if (!browserSessionId) {
          cookiesText.focus();
          return;
        }
        fetch(`/api/browser-sessions/${browserSessionId}/youtube-cookies`, { method: "DELETE" })
          .then((response) => response.json().then((payload) => ({ response, payload })))
          .then(({ response, payload }) => {
            if (!response.ok) {
              setStatus(payload.error || "could not clear youtube login");
              return;
            }
            loginToggle.textContent = "youtube login";
            setStatus("youtube login cleared");
          })
          .catch(() => setStatus("could not clear youtube login"));
        cookiesText.focus();
      });

      cookieSave.addEventListener("click", async () => {
        try {
          await ensureBrowserSession();
          setStatus("saving youtube login");
          const response = await fetch(`/api/browser-sessions/${browserSessionId}/youtube-cookies`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cookiesText: cookiesText.value }),
          });
          const payload = await response.json();
          if (!response.ok) {
            setStatus(payload.error || "could not save youtube login");
            return;
          }
          loginToggle.textContent = "youtube saved";
          cookiesText.value = "";
          closeCookiePanel();
          setStatus("youtube login saved");
          if (urlInput.value) {
            await startRoom();
          }
        } catch (error) {
          setStatus(error.message || "could not save youtube login");
        }
      });

      chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          setStatus("chat is not connected");
          return;
        }
        const text = chatInput.value.trim();
        if (!text) {
          return;
        }
        socket.send(JSON.stringify({ type: "chat", text }));
        chatInput.value = "";
      });

      ensureBrowserSession().catch((error) => setStatus(error.message));

      if (body.dataset.sessionId) {
        loadSession(body.dataset.sessionId);
      }
    </script>
  </body>
</html>
